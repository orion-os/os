<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orbitOS Desktop</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='1.5'><ellipse cx='12' cy='12' rx='9' ry='3' transform='rotate(-30 12 12)' stroke-linecap='round' stroke-linejoin='round'/><circle cx='12' cy='12' r='3.5' fill='white'/><circle cx='5' cy='8' r='1' fill='white'/></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-[#09090b] text-zinc-100 m-0 p-0 select-none overflow-hidden antialiased">
    <div id="root"></div>
    <script type="text/babel">
        const OrbitIcon = ({ className = "w-5 h-5" }) => (
            <svg className={`${className} text-white`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                <ellipse cx="12" cy="12" rx="9" ry="3" transform="rotate(-30 12 12)"/>
                <circle cx="12" cy="12" r="3.5" fill="currentColor"/>
                <circle cx="5" cy="8" r="1" fill="currentColor"/>
            </svg>
        );

        const soundEffects = {
            click: new Audio('https://freesound.org/data/previews/174/174893_2921711-lq.mp3'),
            open: new Audio('https://freesound.org/data/previews/256/256696_3989065-lq.mp3'),
            close: new Audio('https://freesound.org/data/previews/256/256692_3989065-lq.mp3'),
            wallpaper: new Audio('https://freesound.org/data/previews/256/256698_3989065-lq.mp3')
        };

        function SnowOverlay() {
            const canvasRef = React.useRef(null);
            React.useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                resize();
                window.addEventListener('resize', resize);

                const flakes = Array.from({length: 160}, () => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 3.2 + 1,
                    speed: Math.random() * 1.8 + 0.7,
                    drift: Math.random() * 1.2 - 0.6
                }));

                let id;
                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "rgba(255,255,255,0.9)";
                    flakes.forEach(f => {
                        ctx.beginPath();
                        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                        ctx.fill();
                        f.y += f.speed;
                        f.x += f.drift;
                        if (f.y > canvas.height) f.y = -20;
                    });
                    id = requestAnimationFrame(animate);
                };
                animate();
                return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(id); };
            }, []);
            return <canvas ref={canvasRef} className="absolute inset-0 pointer-events-none z-10" />;
        }

        function Draggable({ children, pos, setPos, disabled }) {
            const draggingRef = React.useRef(false);
            const relRef = React.useRef({ x: 0, y: 0 });
            const onDown = (e) => {
                if (disabled) return;
                draggingRef.current = true;
                relRef.current = { x: e.clientX - pos.x, y: e.clientY - pos.y };
                e.preventDefault();
            };
            React.useEffect(() => {
                const onMove = (e) => {
                    if (!draggingRef.current) return;
                    setPos({ x: e.clientX - relRef.current.x, y: e.clientY - relRef.current.y });
                };
                const onUp = () => draggingRef.current = false;
                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);
                return () => {
                    window.removeEventListener('pointermove', onMove);
                    window.removeEventListener('pointerup', onUp);
                };
            }, [setPos]);

            return <div onPointerDown={onDown} style={{position: 'absolute', left: pos.x + 'px', top: pos.y + 'px'}} className="z-40">{children}</div>;
        }

        function OrbitOS() {
            const GITHUB_BASE = "https://raw.githubusercontent.com/orbits-os/os/main/wallpapers/";

            const wallpapers = [
                { id: 'orbit', name: 'Orbit Default', file: 'orbit.png', type: 'image' },
                { id: 'king', name: 'King Canvas', file: 'king.PNG', type: 'image' },
                { id: 'gojo', name: 'Gojo Motion Arena', file: 'Gojo.mp4', type: 'video' },
                { id: 'snowfox', name: 'Snow Fox Live', file: 'SnowFox.mp4', type: 'video' },
                { id: 'sukuna', name: 'Sukuna Fire Unleashed', file: 'sukuna-fire.mp4', type: 'video' }
            ];

            const [selectedWallpaper, setSelectedWallpaper] = React.useState(wallpapers[0]);
            const [windowPos, setWindowPos] = React.useState({ x: 180, y: 100 });
            const [isWindowOpen, setIsWindowOpen] = React.useState(false);
            const [isMaximized, setIsMaximized] = React.useState(false);

            const currentUrl = `${GITHUB_BASE}${encodeURIComponent(selectedWallpaper.file)}`;

            React.useEffect(() => {
                soundEffects.wallpaper.currentTime = 0;
                soundEffects.wallpaper.play().catch(() => {});
            }, [selectedWallpaper.id]);

            const openWallpaperWindow = () => {
                soundEffects.open.currentTime = 0;
                soundEffects.open.play().catch(() => {});
                setIsWindowOpen(true);
            };

            const closeWindow = () => {
                soundEffects.close.currentTime = 0;
                soundEffects.close.play().catch(() => {});
                setIsWindowOpen(false);
            };

            const changeWallpaper = (wp) => {
                setSelectedWallpaper(wp);
                soundEffects.click.currentTime = 0;
                soundEffects.click.play().catch(() => {});
            };

            return (
                <div className="relative w-full h-screen overflow-hidden select-none">
                    {/* Wallpaper */}
                    <div className="absolute inset-0 z-0">
                        {selectedWallpaper.type === 'video' ? (
                            <video key={currentUrl} src={currentUrl} autoPlay loop muted playsInline className="w-full h-full object-cover" />
                        ) : (
                            <div style={{ backgroundImage: `url('${currentUrl}')` }} className="w-full h-full bg-cover bg-center" />
                        )}
                        <SnowOverlay />
                    </div>
                    <div className="absolute inset-0 bg-black/30 z-0" />

                    {/* Top Bar */}
                    <header className="absolute top-0 left-0 right-0 h-11 z-50 bg-zinc-950/70 backdrop-blur-md border-b border-zinc-700 flex items-center px-6">
                        <div onClick={openWallpaperWindow} className="cursor-pointer hover:opacity-80 transition">
                            <OrbitIcon />
                        </div>
                        <div className="ml-auto text-sm text-zinc-300">orbitOS</div>
                    </header>

                    {/* Desktop Icon */}
                    <div className="absolute left-12 top-20 z-20">
                        <button onClick={openWallpaperWindow} className="flex flex-col items-center group">
                            <div className="p-4 bg-zinc-900/80 border border-zinc-700 rounded-2xl group-active:scale-95 transition">
                                <OrbitIcon className="w-8 h-8" />
                            </div>
                            <span className="text-xs mt-2 text-zinc-200">Wallpaper Engine</span>
                        </button>
                    </div>

                    {/* Wallpaper Window */}
                    {isWindowOpen && (
                        <Draggable pos={windowPos} setPos={setWindowPos} disabled={isMaximized}>
                            <div className={`bg-zinc-950 border border-zinc-700 backdrop-blur-xl rounded-2xl shadow-2xl flex flex-col overflow-hidden transition-all ${isMaximized ? 'fixed inset-12' : 'w-[820px] h-[560px]'}`}>
                                {/* Title Bar */}
                                <div className="h-11 bg-zinc-900 flex items-center px-4 cursor-move window-drag-bar select-none">
                                    <div className="flex gap-2">
                                        <button onClick={closeWindow} className="w-3 h-3 rounded-full bg-red-500 hover:bg-red-600 transition" />
                                        <button onClick={() => setIsWindowOpen(false)} className="w-3 h-3 rounded-full bg-yellow-500 hover:bg-yellow-600 transition" />
                                        <button onClick={() => setIsMaximized(!isMaximized)} className="w-3 h-3 rounded-full bg-green-500 hover:bg-green-600 transition" />
                                    </div>
                                    <div className="flex-1 text-center text-sm font-medium text-zinc-300">Wallpaper Engine</div>
                                </div>

                                {/* Content */}
                                <div className="flex-1 p-6 overflow-auto">
                                    <h2 className="text-xl font-semibold mb-6 text-white">Select Wallpaper</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {wallpapers.map(wp => {
                                            const url = `${GITHUB_BASE}${encodeURIComponent(wp.file)}`;
                                            const isActive = selectedWallpaper.id === wp.id;
                                            return (
                                                <button
                                                    key={wp.id}
                                                    onClick={() => changeWallpaper(wp)}
                                                    className={`rounded-2xl overflow-hidden border-2 transition-all ${isActive ? 'border-cyan-400 scale-[1.02]' : 'border-transparent hover:border-zinc-600'}`}
                                                >
                                                    {wp.type === 'video' ? (
                                                        <video src={url} muted loop className="w-full aspect-video object-cover" />
                                                    ) : (
                                                        <img src={url} className="w-full aspect-video object-cover" alt={wp.name} />
                                                    )}
                                                    <div className="p-4 text-left bg-zinc-900/80">
                                                        <div className="font-medium text-white">{wp.name}</div>
                                                        <div className="text-xs text-zinc-500 mt-0.5">{wp.file}</div>
                                                        {isActive && <div className="text-cyan-400 text-xs mt-2">✓ Currently Active</div>}
                                                    </div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </Draggable>
                    )}

                    {/* Bottom Dock */}
                    <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900/90 backdrop-blur-2xl border border-zinc-700 rounded-3xl px-6 py-3 flex gap-4 z-50">
                        <button onClick={openWallpaperWindow} className="p-3 hover:bg-zinc-800 rounded-2xl transition">
                            <OrbitIcon className="w-7 h-7" />
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(OrbitOS));
    </script>
</body>
</html>
