<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orbit.os</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#09090b] text-zinc-100 m-0 p-0 select-none overflow-hidden antialiased">
    <div id="root"></div>

    <script type="text/babel">
        // Minimalistic Desktop Icons
        const SystemIcon = () => (
            <svg class="w-5.5 h-5.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
        );
        const MediaIcon = () => (
            <svg class="w-5.5 h-5.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m10 9 5 3-5 3V9z"/></svg>
        );
        const StorageIcon = () => (
            <svg class="w-5.5 h-5.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        );
        const AnalyticsIcon = () => (
            <svg class="w-5.5 h-5.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>
        );
        const PowerIcon = () => (
            <svg class="w-4 h-4 text-zinc-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.77 0"/></svg>
        );

        // Crisp SVG Star Outline
        const StarOutlineIcon = () => (
            <svg 
                class="w-6 h-6 text-zinc-400 group-hover:text-cyan-400 transition-colors drop-shadow-[0_0_8px_rgba(34,211,238,0.4)]" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                stroke-width="1.5" 
                stroke-linecap="round" 
                stroke-linejoin="round"
            >
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            </svg>
        );

        // Draggable container with uniform transitions
        function Draggable({ children, initialX, initialY, handleClass, disabled, style = {} }) {
            const [pos, setPos] = React.useState({ x: initialX, y: initialY });
            const draggingRef = React.useRef(false);
            const relRef = React.useRef({ x: 0, y: 0 });

            const onPointerDown = (e) => {
                if (disabled) return;
                if (handleClass && !e.target.closest(`.${handleClass}`)) return;
                
                draggingRef.current = true;
                relRef.current = {
                    x: e.clientX - pos.x,
                    y: e.clientY - pos.y
                };
                e.preventDefault();
            };

            React.useEffect(() => {
                const onPointerMove = (e) => {
                    if (!draggingRef.current) return;
                    setPos({
                        x: e.clientX - relRef.current.x,
                        y: e.clientY - relRef.current.y
                    });
                };

                const onPointerUp = () => {
                    draggingRef.current = false;
                };

                window.addEventListener('pointermove', onPointerMove);
                window.addEventListener('pointerup', onPointerUp);
                return () => {
                    window.removeEventListener('pointermove', onPointerMove);
                    window.removeEventListener('pointerup', onPointerUp);
                };
            }, [pos, disabled]);

            const dragStyle = disabled ? style : {
                ...style,
                position: 'absolute',
                left: `${pos.x}px`,
                top: `${pos.y}px`
            };

            return (
                <div onPointerDown={onPointerDown} style={dragStyle} class={draggingRef.current ? "" : "transition-all duration-300 ease-in-out"}>
                    {children}
                </div>
            );
        }

        function OrionOS() {
            const [time, setTime] = React.useState('');
            const [activeWindow, setActiveWindow] = React.useState('dashboard');
            const [isMaximized, setIsMaximized] = React.useState(false);
            const [isVisible, setIsVisible] = React.useState(true); // Tracks open/close display states
            const [isAnimating, setIsAnimating] = React.useState(false); // Prevents rapid-click style bugs
            const [isStartOpen, setIsStartOpen] = React.useState(false);

            React.useEffect(() => {
                const updateTime = () => {
                    const now = new Date();
                    setTime(now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }));
                };
                updateTime();
                const interval = setInterval(updateTime, 60000);
                return () => clearInterval(interval);
            }, []);

            const apps = [
                { id: 'dashboard', label: 'Dashboard', icon: SystemIcon, defaultX: 32, defaultY: 80 },
                { id: 'library', label: 'Media Deck', icon: MediaIcon, defaultX: 32, defaultY: 180 },
                { id: 'files', label: 'Storage', icon: StorageIcon, defaultX: 32, defaultY: 280 },
                { id: 'analytics', label: 'Analytics', icon: AnalyticsIcon, defaultX: 32, defaultY: 380 },
            ];

            // Smooth Close / Minimize transition handler
            const handleWindowClose = () => {
                if (isAnimating) return;
                setIsAnimating(true);
                setIsVisible(false);
                setTimeout(() => {
                    setIsAnimating(false);
                }, 300);
            };

            const handleAppClick = (appId) => {
                if (isAnimating) return;

                if (activeWindow === appId) {
                    // Toggle visibility smoothly if clicking the already selected app
                    setIsAnimating(true);
                    setIsVisible(!isVisible);
                    setTimeout(() => setIsAnimating(false), 300);
                } else {
                    // If switching to a completely different app
                    setIsAnimating(true);
                    if (isVisible) {
                        setIsVisible(false);
                        setTimeout(() => {
                            setActiveWindow(appId);
                            setIsVisible(true);
                            setIsAnimating(false);
                        }, 200);
                    } else {
                        setActiveWindow(appId);
                        setIsVisible(true);
                        setTimeout(() => setIsAnimating(false), 300);
                    }
                }
                setIsStartOpen(false);
            };

            return (
                <div class="relative w-full h-screen text-zinc-100 overflow-hidden select-none bg-[#09090b]">
                    
                    {/* SYSTEM WALLPAPER EFFECT */}
                    <div class="absolute inset-0 z-0 pointer-events-none">
                        <div class="absolute top-[20%] left-[30%] w-[40%] h-[40%] bg-zinc-800/10 rounded-full blur-[140px]" />
                    </div>

                    {/* TOP SYSTEM MENU BAR */}
                    <header class="absolute top-0 left-0 right-0 h-10 z-50 flex items-center justify-between px-6 bg-zinc-950/40 border-b border-zinc-800/20 backdrop-blur-md text-xs font-medium text-zinc-400">
                        <div class="flex items-center gap-5">
                            <span class="text-zinc-100 font-semibold tracking-tight">orionOS</span>
                            <span class="text-zinc-800">|</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">File</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">View</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">Special</span>
                        </div>
                        <div class="flex items-center gap-4 text-zinc-400">
                            <span class="font-normal text-zinc-300">{time}</span>
                        </div>
                    </header>

                    {/* DESKTOP WORKSPACE */}
                    <main class="relative w-full h-full z-10" onClick={() => setIsStartOpen(false)}>
                        
                        {/* SHORTCUT ICONS */}
                        {apps.map((app) => {
                            const AppIcon = app.icon;
                            const isOpen = activeWindow === app.id && isVisible;
                            return (
                                <Draggable key={app.id} initialX={app.defaultX} initialY={app.defaultY}>
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); handleAppClick(app.id); }}
                                        class="group flex flex-col items-center justify-center w-20 h-20 rounded-xl border border-transparent hover:border-zinc-700/30 hover:bg-zinc-950/30 transition-all cursor-grab active:cursor-grabbing text-center"
                                    >
                                        <div class={`p-3 rounded-xl bg-zinc-950/40 border border-zinc-800/30 backdrop-blur-md shadow-md relative text-zinc-300 group-hover:text-zinc-100 pointer-events-none transition-all duration-300
                                            ${isOpen ? 'bg-zinc-900/80 border-zinc-700/60 scale-105 shadow-cyan-950/20' : ''}`}>
                                            <AppIcon />
                                            {activeWindow === app.id && (
                                                <span class={`absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-zinc-400 transition-all duration-300 ${isVisible ? 'bg-zinc-100' : 'bg-zinc-500'}`} />
                                            )}
                                        </div>
                                        <span class="text-[10px] mt-2 text-zinc-300 group-hover:text-zinc-100 font-medium drop-shadow-md truncate w-full px-1 pointer-events-none">
                                            {app.label}
                                        </span>
                                    </button>
                                </Draggable>
                            );
                        })}

                        {/* WINDOW FRAME LAYER */}
                        {activeWindow && (
                            <div class={isVisible ? "" : "pointer-events-none"}>
                                <Draggable 
                                    initialX={160} 
                                    initialY={96} 
                                    handleClass="window-drag-bar" 
                                    disabled={isMaximized}
                                    style={
                                        isMaximized 
                                            ? { width: 'calc(100vw - 48px)', height: 'calc(100vh - 180px)', left: '24px', top: '56px' } 
                                            : { width: 'calc(100vw - 220px)', height: 'calc(100vh - 240px)', minWidth: '320px', minHeight: '240px' }
                                    }
                                >
                                    <div 
                                        class={`bg-zinc-950/80 border border-zinc-800/80 backdrop-blur-xl rounded-xl shadow-2xl flex flex-col overflow-hidden h-full w-full z-30 transition-all duration-300 ease-in-out origin-center
                                            ${isVisible ? 'opacity-100 scale-100 blur-none' : 'opacity-0 scale-95 blur-sm'}`}
                                        onClick={(e) => e.stopPropagation()}
                                    >
                                        {/* Window Title Bar */}
                                        <div class="window-drag-bar h-12 bg-zinc-900/40 border-b border-zinc-800/30 flex items-center px-5 cursor-grab active:cursor-grabbing select-none relative">
                                            
                                            {/* Window Action Lights */}
                                            <div class="flex items-center gap-2 group/lights z-10">
                                                {/* Close Button */}
                                                <button onClick={handleWindowClose} class="w-3 h-3 rounded-full bg-[#ff5f56] border border-[#e0443e] flex items-center justify-center cursor-pointer relative">
                                                    <span class="text-[9px] font-bold text-[#4c0002] opacity-0 group-hover/lights:opacity-100 transition-opacity absolute pb-0.5">✕</span>
                                                </button>
                                                {/* Minimize Button (-) runs uniform close sequence animation */}
                                                <button onClick={handleWindowClose} class="w-3 h-3 rounded-full bg-[#ffbd2e] border border-[#dea123] flex items-center justify-center cursor-pointer relative">
                                                    <span class="text-[11px] font-bold text-[#5c3e00] opacity-0 group-hover/lights:opacity-100 transition-opacity absolute pb-1.5">_</span>
                                                </button>
                                                {/* Maximize Expansion Button */}
                                                <button onClick={() => setIsMaximized(!isMaximized)} class="w-3 h-3 rounded-full bg-[#27c93f] border border-[#1aaa2c] flex items-center justify-center cursor-pointer relative">
                                                    <span class="text-[7px] font-bold text-[#004d05] opacity-0 group-hover/lights:opacity-100 transition-opacity absolute pb-0.5">{isMaximized ? '⌥' : '⤢'}</span>
                                                </button>
                                            </div>

                                            <div class="absolute inset-x-0 text-center pointer-events-none">
                                                <span class="text-xs font-semibold tracking-wide text-zinc-400 capitalize">{activeWindow}</span>
                                            </div>
                                        </div>

                                        {/* App Contents Frame */}
                                        <div class="flex-1 p-6 overflow-y-auto cursor-default">
                                            {activeWindow === 'dashboard' ? (
                                                <div class="space-y-6 max-w-4xl">
                                                    <div>
                                                        <h2 class="text-lg font-bold tracking-tight text-white">System Environment</h2>
                                                        <p class="text-xs text-zinc-400 mt-1">Operational view of active configurations inside orionOS.</p>
                                                    </div>
                                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 pt-2">
                                                        <div class="p-4 rounded-lg bg-zinc-900/40 border border-zinc-800/50">
                                                            <div class="text-[10px] text-zinc-500 font-medium uppercase tracking-wider">Memory Array</div>
                                                            <div class="text-base font-semibold text-zinc-200 mt-1">Optimized</div>
                                                        </div>
                                                        <div class="p-4 rounded-lg bg-zinc-900/40 border border-zinc-800/50">
                                                            <div class="text-[10px] text-zinc-500 font-medium uppercase tracking-wider">Pipeline Output</div>
                                                            <div class="text-base font-semibold text-zinc-200 mt-1">Active Index</div>
                                                        </div>
                                                        <div class="p-4 rounded-lg bg-zinc-900/40 border border-zinc-800/50">
                                                            <div class="text-[10px] text-zinc-500 font-medium uppercase tracking-wider">Environment Node</div>
                                                            <div class="text-base font-semibold text-emerald-500 mt-1">Verified</div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div class="h-full flex flex-col items-center justify-center text-center py-12">
                                                    <h3 class="text-xs font-semibold text-zinc-300 capitalize">{activeWindow} Sandbox Ready</h3>
                                                    <p class="text-[11px] text-zinc-500 max-w-xs mt-1">Module frame securely parsed onto the primary viewport stack sequence.</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </Draggable>
                            </div>
                        )}
                    </main>

                    {/* START MENU POPUP PANEL */}
                    {isStartOpen && (
                        <div 
                            class="absolute bottom-24 left-1/2 -translate-x-1/2 md:left-8 md:translate-x-0 w-72 bg-zinc-950/95 border border-zinc-800/80 backdrop-blur-2xl rounded-2xl shadow-2xl z-50 p-4 flex flex-col overflow-hidden"
                            onClick={(e) => e.stopPropagation()}
                        >
                            <div class="px-2 pb-3 mb-2 border-b border-zinc-900 flex flex-col">
                                <span class="text-xs font-semibold text-zinc-200">orionOS Workspace</span>
                                <span class="text-[10px] text-zinc-500 mt-0.5">Local User Node</span>
                            </div>
                            
                            <div class="flex-1 space-y-1">
                                <div class="text-[9px] font-bold text-zinc-600 px-2 uppercase tracking-wider mb-1">Applications</div>
                                {apps.map((app) => {
                                    const AppIcon = app.icon;
                                    return (
                                        <button 
                                            key={app.id} 
                                            onClick={() => handleAppClick(app.id)}
                                            class="w-full flex items-center gap-3 px-2.5 py-2 rounded-xl text-xs text-zinc-400 hover:text-zinc-100 hover:bg-zinc-900/60 transition-colors text-left cursor-pointer"
                                        >
                                            <div class="text-zinc-500 group-hover:text-zinc-300"><AppIcon /></div>
                                            <span class="font-medium">{app.label}</span>
                                        </button>
                                    );
                                })}
                            </div>

                            <div class="mt-4 pt-2 border-t border-zinc-900 flex items-center justify-between px-2 text-[11px] text-zinc-500">
                                <span class="text-[10px]">v1.1.0-Release</span>
                                <button onClick={() => { setIsStartOpen(false); setIsVisible(false); }} class="flex items-center gap-1.5 hover:text-rose-400 transition-colors cursor-pointer">
                                    <PowerIcon />
                                    <span>Log Out</span>
                                </button>
                            </div>
                        </div>
                    )}

                    {/* SYSTEM TASKBAR DOCK */}
                    <div class="absolute bottom-5 left-1/2 -translate-x-1/2 z-50 pointer-events-auto">
                        <div class="h-18 px-6 rounded-2xl bg-zinc-950/40 border border-zinc-800/40 backdrop-blur-xl flex items-center gap-5 shadow-2xl">
                            
                            {/* App Launcher Button */}
                            <button 
                                onClick={(e) => { e.stopPropagation(); setIsStartOpen(!isStartOpen); }}
                                class={`w-11 h-11 rounded-xl transition-all duration-300 cursor-pointer border relative group flex items-center justify-center bg-zinc-900/30 hover:bg-zinc-900/70
                                    ${isStartOpen 
                                        ? 'border-cyan-400 scale-105 shadow-[0_0_12px_rgba(34,211,238,0.25)] bg-zinc-900/90' 
                                        : 'border-zinc-800/80 hover:border-zinc-500'
                                    }`}
                            >
                                <StarOutlineIcon />
                                <span class={`absolute -bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-cyan-400 transition-all duration-300 ${isStartOpen ? 'scale-100' : 'scale-0'}`} />
                            </button>

                            <span class="text-zinc-800 font-light text-xl select-none">|</span>

                            {/* Dock Icons Mapping */}
                            {apps.map((app) => {
                                const AppIcon = app.icon;
                                const isCurrentActive = activeWindow === app.id;
                                const isCurrentOpen = isCurrentActive && isVisible;
                                
                                return (
                                    <button
                                        key={app.id}
                                        onClick={(e) => { e.stopPropagation(); handleAppClick(app.id); }}
                                        class={`p-3 rounded-xl transition-all duration-300 relative cursor-pointer group transform active:scale-95
                                            ${isCurrentOpen 
                                                ? 'bg-zinc-100 text-zinc-950 shadow-md scale-105' 
                                                : isCurrentActive
                                                ? 'text-zinc-400 border border-zinc-800/50 bg-zinc-900/40 shadow-inner scale-100'
                                                : 'text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/40'
                                            }`}
                                    >
                                        <div class={isCurrentOpen ? 'text-zinc-950' : ''}>
                                            <AppIcon />
                                        </div>
                                        <span class={`absolute bottom-0.5 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full transition-all duration-300
                                            ${isCurrentOpen ? 'bg-zinc-950 scale-100' : isCurrentActive ? 'bg-zinc-500 scale-100' : 'bg-zinc-400 scale-0 group-hover:scale-100'}`} 
                                        />
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {/* FOOTER BAR */}
                    <footer class="absolute bottom-0 left-0 right-0 h-7 px-6 bg-zinc-950/10 border-t border-zinc-900/20 flex items-center justify-between text-[10px] text-zinc-500 z-40">
                        <span>Workspace: Primary</span>
                        <span>orionOS</span>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OrionOS />);
    </script>
</body>
</html>
