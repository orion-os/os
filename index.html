<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orbitOS Desktop</title>
    <!-- Old Classic Logo as Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='1.5'><rect width='18' height='18' x='3' y='3' rx='2'/><path d='M9 3v18M15 3v18M3 9h18M3 15h18'/></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#09090b] text-zinc-100 m-0 p-0 select-none overflow-hidden antialiased">
    <div id="root"></div>
    <script type="text/babel">
        const HubIcon = () => (
            <svg class="w-5.5 h-5.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
        );
        const MediaIcon = () => (
            <svg class="w-5.5 h-5.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m10 9 5 3-5 3V9z"/></svg>
        );
        const StorageIcon = () => (
            <svg class="w-5.5 h-5.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        );
        const PowerIcon = () => (
            <svg class="w-4 h-4 text-zinc-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.77 0"/></svg>
        );

        // === OLD CLASSIC LOGO RESTORED ===
        const OrbitIcon = ({ className = "w-6 h-6" }) => (
            <svg
                class={`${className} text-white transition-colors drop-shadow-[0_0_8px_rgba(255,255,255,0.4)] group-hover:text-cyan-400 group-hover:drop-shadow-[0_0_8px_rgba(34,211,238,0.4)]`}
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <rect width="18" height="18" x="3" y="3" rx="2"/>
                <path d="M9 3v18M15 3v18M3 9h18M3 15h18"/>
            </svg>
        );

        function Draggable({ children, pos, setPos, handleClass, disabled }) {
            const draggingRef = React.useRef(false);
            const relRef = React.useRef({ x: 0, y: 0 });
            const onPointerDown = (e) => {
                if (disabled) return;
                if (handleClass && !e.target.closest(`.${handleClass}`)) return;
                draggingRef.current = true;
                relRef.current = { x: e.clientX - pos.x, y: e.clientY - pos.y };
                e.preventDefault();
                e.stopPropagation();
            };
            React.useEffect(() => {
                const onPointerMove = (e) => {
                    if (!draggingRef.current) return;
                    setPos({ x: e.clientX - relRef.current.x, y: e.clientY - relRef.current.y });
                };
                const onPointerUp = () => { draggingRef.current = false; };
                window.addEventListener('pointermove', onPointerMove);
                window.addEventListener('pointerup', onPointerUp);
                return () => {
                    window.removeEventListener('pointermove', onPointerMove);
                    window.removeEventListener('pointerup', onPointerUp);
                };
            }, [pos, disabled, setPos]);

            const style = disabled ? {} : { position: 'absolute', left: `${pos.x}px`, top: `${pos.y}px` };
            return (
                <div onPointerDown={onPointerDown} style={style} class={`z-30 ${disabled ? 'w-full h-full' : ''}`}>
                    {children}
                </div>
            );
        }

        function OrbitOS() {
            const GITHUB_RAW_BASE = "https://raw.githubusercontent.com/orbits-os/os/main/wallpapers/";
           
            const githubWallpapers = [
                { id: 'wall-orbit', name: 'Orbit Default', file: 'orion.png', type: 'image' },
                { id: 'wall-king', name: 'King Canvas', file: 'king.PNG', type: 'image' },
                { id: 'wall-gojo', name: 'Gojo Motion Arena', file: 'Gojo.mp4', type: 'video' },
                { id: 'wall-fox', name: 'Snow Fox Live', file: 'SnowFox.mp4', type: 'video' },
                { id: 'wall-sukuna', name: 'Sukuna Fire Unleashed', file: 'sukuna-fire.mp4', type: 'video' }
            ];

            const apps = [
                { id: 'hub', label: 'System Hub', icon: HubIcon, defaultX: 32, defaultY: 80 },
                { id: 'library', label: 'Media Deck', icon: MediaIcon, defaultX: 32, defaultY: 180 },
                { id: 'files', label: 'Storage', icon: StorageIcon, defaultX: 32, defaultY: 280 },
            ];

            const [time, setTime] = React.useState('');
            const [fps, setFps] = React.useState(60);
            const [activeWindow, setActiveWindow] = React.useState(() => localStorage.getItem('orbitOS_activeWindow') || null);
            const [hubTab, setHubTab] = React.useState(() => localStorage.getItem('orbitOS_hubTab') || 'dashboard');
            const [selectedWallpaper, setSelectedWallpaper] = React.useState(() => {
                const savedWp = localStorage.getItem('orbitOS_selectedWallpaper');
                return githubWallpapers.find(w => w.id === savedWp) || githubWallpapers[0];
            });
            const [isMaximized, setIsMaximized] = React.useState(false);
            const [isVisible, setIsVisible] = React.useState(activeWindow !== null);
            const [isAnimating, setIsAnimating] = React.useState(false);
            const [isStartOpen, setIsStartOpen] = React.useState(false);
            const [windowPos, setWindowPos] = React.useState({ x: 160, y: 96 });

            React.useEffect(() => {
                if (activeWindow) localStorage.setItem('orbitOS_activeWindow', activeWindow);
                else localStorage.removeItem('orbitOS_activeWindow');
            }, [activeWindow]);

            React.useEffect(() => { localStorage.setItem('orbitOS_hubTab', hubTab); }, [hubTab]);
            React.useEffect(() => { localStorage.setItem('orbitOS_selectedWallpaper', selectedWallpaper.id); }, [selectedWallpaper]);

            const activeAssetUrl = `${GITHUB_RAW_BASE}${encodeURIComponent(selectedWallpaper.file)}`;

            React.useEffect(() => {
                const updateTime = () => setTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }));
                updateTime();
                const interval = setInterval(updateTime, 60000);
                return () => clearInterval(interval);
            }, []);

            React.useEffect(() => {
                let last = performance.now(), count = 0, id;
                const calc = () => {
                    const now = performance.now();
                    count++;
                    if (now - last >= 1000) {
                        setFps(Math.round((count * 1000) / (now - last)));
                        count = 0; last = now;
                    }
                    id = requestAnimationFrame(calc);
                };
                id = requestAnimationFrame(calc);
                return () => cancelAnimationFrame(id);
            }, []);

            const handleWindowClose = () => {
                if (isAnimating) return;
                setIsAnimating(true);
                setIsVisible(false);
                setTimeout(() => {
                    setActiveWindow(null);
                    setIsMaximized(false);
                    setIsAnimating(false);
                }, 300);
            };

            const handleWindowMinimize = () => {
                if (isAnimating) return;
                if (isMaximized) setIsMaximized(false);
                else {
                    setIsAnimating(true);
                    setIsVisible(false);
                    setTimeout(() => setIsAnimating(false), 300);
                }
            };

            const handleAppClick = (appId, explicitTab = null) => {
                if (isAnimating) return;
                if (explicitTab) setHubTab(explicitTab);
                if (activeWindow === appId) {
                    setIsVisible(!isVisible);
                } else {
                    setActiveWindow(appId);
                    setIsVisible(true);
                    setIsMaximized(false);
                }
                setIsStartOpen(false);
            };

            return (
                <div class="relative w-full h-screen text-zinc-100 overflow-hidden select-none bg-[#09090b]">
                    {/* Wallpaper */}
                    <div class="absolute inset-0 w-full h-full z-0 pointer-events-none transition-all duration-700">
                        {selectedWallpaper.type === 'video' ? (
                            <video key={activeAssetUrl} src={activeAssetUrl} autoPlay loop muted playsInline class="w-full h-full object-cover" />
                        ) : (
                            <div style={{ backgroundImage: `url('${activeAssetUrl}')` }} class="w-full h-full bg-cover bg-center transition-all duration-700" />
                        )}
                    </div>
                    <div class="absolute inset-0 bg-black/20 z-0 pointer-events-none backdrop-brightness-[0.92]" />

                    {/* Top Bar - Old Logo */}
                    <header class="absolute top-0 left-0 right-0 h-10 z-50 flex items-center justify-between px-5 bg-zinc-950/40 border-b border-zinc-800/20 backdrop-blur-md text-xs font-medium text-zinc-400">
                        <div class="flex items-center gap-4">
                            <div class="flex items-center text-white cursor-pointer hover:opacity-80 transition-opacity" onClick={() => setIsStartOpen(!isStartOpen)}>
                                <OrbitIcon className="w-5 h-5" />
                            </div>
                            <span class="text-zinc-800">|</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">File</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">View</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">Special</span>
                        </div>
                        <div class="flex items-center gap-4 text-zinc-400">
                            <span class="bg-zinc-900/80 px-2 py-0.5 rounded border border-zinc-800 text-[10px] text-emerald-400 font-mono">{fps} FPS</span>
                            <span class="font-normal text-zinc-300">{time}</span>
                        </div>
                    </header>

                    {/* Desktop Icons */}
                    <main class="relative w-full h-full z-10" onClick={() => setIsStartOpen(false)}>
                        {apps.map((app) => {
                            const AppIcon = app.icon;
                            const isOpen = activeWindow === app.id && isVisible;
                            return (
                                <div key={app.id} style={{ position: 'absolute', left: `${app.defaultX}px`, top: `${app.defaultY}px` }} class="z-20">
                                    <button onClick={() => handleAppClick(app.id)} class="group flex flex-col items-center justify-center w-20 h-20 rounded-xl border border-transparent hover:border-zinc-700/30 hover:bg-zinc-950/30 transition-all cursor-pointer">
                                        <div class={`p-3 rounded-xl bg-zinc-950/40 border border-zinc-800/30 backdrop-blur-md shadow-md ${isOpen ? 'bg-zinc-900/80 border-zinc-700/60 scale-105' : ''}`}>
                                            <AppIcon />
                                        </div>
                                        <span class="text-[10px] mt-2 text-zinc-300 group-hover:text-zinc-100 font-medium truncate w-full px-1">{app.label}</span>
                                    </button>
                                </div>
                            );
                        })}

                        {/* Window */}
                        {activeWindow && (
                            <div class={`w-full h-full absolute inset-0 z-30 ${isVisible ? "" : "pointer-events-none"}`}>
                                <Draggable pos={windowPos} setPos={setWindowPos} handleClass="window-drag-bar" disabled={isMaximized}>
                                    <div style={isMaximized ? {position:'fixed', left:'16px', top:'56px', width:'calc(100vw - 32px)', height:'calc(100vh - 132px)'} : {width:'calc(100vw - 220px)', height:'calc(100vh - 240px)', minWidth:'540px', minHeight:'400px'}} 
                                        class={`bg-zinc-950/92 border border-zinc-800/80 backdrop-blur-xl rounded-xl shadow-2xl flex flex-col overflow-hidden transition-all duration-300 ${isVisible ? 'opacity-100 scale-100' : 'opacity-0 scale-95'}`}>
                                        <div class="window-drag-bar h-12 bg-zinc-900/40 border-b border-zinc-800/30 flex items-center px-5 cursor-grab active:cursor-grabbing">
                                            <div class="flex items-center gap-2">
                                                <button onClick={handleWindowClose} class="w-3 h-3 rounded-full bg-red-500"></button>
                                                <button onClick={handleWindowMinimize} class="w-3 h-3 rounded-full bg-yellow-500"></button>
                                                <button onClick={() => setIsMaximized(!isMaximized)} class="w-3 h-3 rounded-full bg-green-500"></button>
                                            </div>
                                            <div class="flex-1 text-center text-xs font-semibold text-zinc-400">
                                                {activeWindow === 'hub' ? 'System Hub' : activeWindow === 'files' ? 'Storage' : 'Media Deck'}
                                            </div>
                                        </div>
                                        <div class="flex-1 overflow-y-auto p-6">
                                            {/* Content for each app - same as your original */}
                                            {activeWindow === 'hub' && <div>System Hub Content...</div>}
                                            {activeWindow === 'files' && <div>Storage Content...</div>}
                                            {activeWindow === 'library' && <div>Media Deck Content...</div>}
                                        </div>
                                    </div>
                                </Draggable>
                            </div>
                        )}
                    </main>

                    {/* Taskbar Dock with Old Logo */}
                    <div class="absolute bottom-5 left-1/2 -translate-x-1/2 z-50">
                        <div class="h-16 px-6 rounded-2xl bg-zinc-950/70 border border-zinc-700/50 backdrop-blur-xl flex items-center gap-4 shadow-2xl">
                            <button onClick={() => setIsStartOpen(!isStartOpen)} class="w-12 h-12 flex items-center justify-center rounded-xl hover:bg-zinc-800 transition-all">
                                <OrbitIcon className="w-6 h-6" />
                            </button>
                            {apps.map(app => (
                                <button key={app.id} onClick={() => handleAppClick(app.id)} class="p-3 rounded-xl hover:bg-zinc-800/50 transition-all">
                                    <app.icon />
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OrbitOS />);
    </script>
</body>
</html>
