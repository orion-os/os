<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orionOS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-spin-custom { animation: spin 5s linear infinite; }
        .animate-pulse-custom { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-[#030712]">
    <div id="root"></div>

    <script type="text/babel">
        // Standardizing icons since Lucide is loaded via script tag globally
        const Disc = () => <i data-lucide="disc" class="w-3.5 h-3.5 text-cyan-400 animate-spin-custom"></i>;
        const Cpu = () => <i data-lucide="cpu" class="w-6 h-6 text-cyan-400"></i>;
        const Database = () => <i data-lucide="database" class="w-6 h-6 text-indigo-400"></i>;
        const Layers = () => <i data-lucide="layers" class="w-6 h-6 text-emerald-400"></i>;
        const Folder = () => <i data-lucide="folder" class="w-6 h-6 text-amber-400"></i>;
        const Terminal = () => <i data-lucide="terminal" class="w-3.5 h-3.5 text-cyan-400"></i>;
        const Maximize2 = () => <i data-lucide="maximize-2" class="w-3.5 h-3.5"></i>;
        const Minimize2 = () => <i data-lucide="minimize-2" class="w-3.5 h-3.5"></i>;
        const X = () => <i data-lucide="x" class="w-3.5 h-3.5"></i>;
        const Activity = ({ className }) => <i data-lucide="activity" class={className}></i>;
        const Settings = () => <i data-lucide="settings" class="w-3.5 h-3.5"></i>;

        function OrionOS() {
            const [time, setTime] = React.useState('');
            const [activeWindow, setActiveWindow] = React.useState('core');
            const [isMaximized, setIsMaximized] = React.useState(false);
            const [logs, setLogs] = React.useState(['[orionOS] Initializing system kernel...', '[orionOS] Allocation of secure memory blocks successful.']);

            React.useEffect(() => {
                const updateTime = () => {
                    const now = new Date();
                    setTime(now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }));
                };
                updateTime();
                const interval = setInterval(updateTime, 1000);
                return () => clearInterval(interval);
            }, []);

            React.useEffect(() => {
                // Initialize icons after React renders
                if (window.lucide) window.lucide.createIcons();
            }, [activeWindow]);

            const addLog = (msg) => {
                setLogs((prev) => [...prev.slice(-4), `[orionOS_user]: ${msg}`]);
            };

            const desktopIcons = [
                { id: 'core', label: 'System_Core', icon: Cpu, color: 'text-cyan-400' },
                { id: 'database', label: 'Data_Vault', icon: Database, color: 'text-indigo-400' },
                { id: 'nodes', label: 'Network_Nodes', icon: Layers, color: 'text-emerald-400' },
                { id: 'fs', label: 'File_System', icon: Folder, color: 'text-amber-400' },
            ];

            return (
                <div class="relative w-full h-screen text-slate-100 font-mono overflow-hidden select-none antialiased">
                    {/* BACKGROUND AMBIENT */}
                    <div class="absolute inset-0 z-0 pointer-events-none">
                        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-cyan-500/10 rounded-full blur-[120px]" />
                        <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-indigo-500/10 rounded-full blur-[150px]" />
                    </div>

                    {/* SYSTEM TOP BAR */}
                    <header class="absolute top-0 left-0 right-0 h-9 z-50 flex items-center justify-between px-4 bg-slate-950/60 border-b border-slate-800/50 backdrop-blur-md text-[11px] tracking-wider text-slate-400">
                        <div class="flex items-center gap-4">
                            <div class="flex items-center gap-1.5 font-bold text-slate-200">
                                <Disc />
                                <span class="tracking-widest">orionOS</span>
                            </div>
                            <span class="text-slate-600">|</span>
                            <div class="flex items-center gap-2 text-slate-400">
                                <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse-custom" />
                                <span>KERNEL: ACTIVE</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="hidden md:flex items-center gap-3 text-slate-500">
                                <span>CPU: 12%</span>
                                <span>MEM: 3.8GB</span>
                            </div>
                            <span class="text-slate-600">|</span>
                            <span class="text-cyan-400 font-bold tracking-widest">{time}</span>
                        </div>
                    </header>

                    {/* MAIN DESKTOP */}
                    <main class="relative z-10 w-full h-full pt-14 pb-6 px-6 flex">
                        <div class="flex flex-col gap-6 z-20">
                            {desktopIcons.map((icon) => {
                                const IconComponent = icon.icon;
                                const isRunning = activeWindow === icon.id;
                                return (
                                    <button key={icon.id} onClick={() => { setActiveWindow(icon.id); addLog(`Mapping path to ${icon.label}.bin`); }} class="group flex flex-col items-center justify-center w-20 h-20 rounded-xl border border-transparent hover:border-slate-800/60 hover:bg-slate-900/30 transition-all duration-200 cursor-pointer">
                                        <div class="relative p-3 rounded-lg bg-slate-900/50 border border-slate-800/40 group-hover:scale-105 transition-transform shadow-lg">
                                            <IconComponent />
                                            {isRunning && <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-3 h-0.5 bg-cyan-400 rounded-full shadow-[0_0_8px_#22d3ee]" />}
                                        </div>
                                        <span class="text-[10px] mt-2 text-slate-400 group-hover:text-slate-200 text-center font-medium truncate w-full px-1">{icon.label}</span>
                                    </button>
                                );
                            })}
                        </div>

                        {/* WINDOW COMPONENT */}
                        {activeWindow && (
                            <div class={`absolute transition-all duration-300 ease-out z-30 bg-slate-950/60 border border-slate-800/80 backdrop-blur-xl rounded-xl shadow-[0_25px_70px_rgba(0,0,0,0.8)] flex flex-col overflow-hidden ${isMaximized ? 'top-14 left-6 right-6 bottom-6' : 'top-20 left-32 right-6 bottom-16 md:right-12 md:bottom-20'}`}>
                                <div class="h-10 bg-slate-900/70 border-b border-slate-800/60 flex items-center justify-between px-4">
                                    <div class="flex items-center gap-2 text-xs font-bold text-slate-300">
                                        <Terminal />
                                        <span class="uppercase tracking-wider">orionOS://{activeWindow}_process</span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <button onClick={() => setIsMaximized(!isMaximized)} class="p-1 rounded hover:bg-slate-800 text-slate-400 hover:text-slate-200 cursor-pointer">
                                            {isMaximized ? <Minimize2 /> : <Maximize2 />}
                                        </button>
                                        <button onClick={() => { setActiveWindow(null); addLog('Process context closed.'); }} class="p-1 rounded hover:bg-rose-950/50 text-slate-400 hover:text-rose-400 cursor-pointer">
                                            <X />
                                        </button>
                                    </div>
                                </div>

                                <div class="flex-1 p-6 overflow-y-auto space-y-6">
                                    {activeWindow === 'core' ? (
                                        <div class="space-y-6 max-w-4xl">
                                            <div class="p-6 rounded-lg bg-slate-900/40 border border-slate-800/40 space-y-4">
                                                <h4 class="text-xs text-cyan-400 font-bold tracking-widest uppercase">orionOS Diagnostics</h4>
                                                <p class="text-xs text-slate-400 leading-relaxed">Systems are fully localized. The orionOS architecture provides high-throughput matrix computing channels seamlessly integrated over clean micro-panel layers.</p>
                                            </div>
                                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                                <div class="p-4 rounded-lg bg-slate-900/40 border border-slate-800/40">
                                                    <div class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Pipeline Flow</div>
                                                    <div class="text-sm font-semibold text-slate-200 mt-1">Synchronous</div>
                                                </div>
                                                <div class="p-4 rounded-lg bg-slate-900/40 border border-slate-800/40">
                                                    <div class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Interface Node</div>
                                                    <div class="text-sm font-semibold text-emerald-400 mt-1">Localhost</div>
                                                </div>
                                                <div class="p-4 rounded-lg bg-slate-900/40 border border-slate-800/40">
                                                    <div class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Hardware Deck</div>
                                                    <div class="text-sm font-semibold text-slate-200 mt-1">Virtual Core</div>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div class="h-full flex flex-col items-center justify-center text-center opacity-80 pt-12">
                                            <Activity className="w-8 h-8 text-cyan-500 animate-pulse-custom mb-3" />
                                            <h3 class="text-sm font-bold text-slate-200 uppercase tracking-widest">{activeWindow} instance online</h3>
                                            <p class="text-xs text-slate-500 mt-1">Listening for subsystem directives inside the parent loop.</p>
                                        </div>
                                    )}
                                </div>

                                <div class="h-7 bg-slate-950 border-t border-slate-900 px-4 flex items-center justify-between text-[10px] text-slate-500">
                                    <span class="truncate max-w-md text-slate-400">{logs[logs.length - 1]}</span>
                                    <span class="text-cyan-500/70">orionOS_SHELL_V1</span>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* BOTTOM DOCK */}
                    <div class="absolute bottom-3 left-1/2 -translate-x-1/2 z-40">
                        <div class="h-10 px-4 rounded-full bg-slate-950/80 border border-slate-800/60 backdrop-blur-lg flex items-center gap-6 shadow-xl text-xs">
                            <button onClick={() => addLog('System metrics checked.')} class="text-slate-400 hover:text-cyan-400 flex items-center gap-1.5 cursor-pointer">
                                <Activity className="w-3.5 h-3.5" /> Telemetry
                            </button>
                            <span class="text-slate-800">|</span>
                            <button onClick={() => addLog('
