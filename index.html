<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orionOS Desktop</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#09090b] text-zinc-100 m-0 p-0 select-none overflow-hidden antialiased">
    <div id="root"></div>

    <script type="text/babel">
        // Minimalistic Desktop Icons
        const HubIcon = () => (
            <svg class="w-5.5 h-5.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
        );
        const MediaIcon = () => (
            <svg class="w-5.5 h-5.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m10 9 5 3-5 3V9z"/></svg>
        );
        const StorageIcon = () => (
            <svg class="w-5.5 h-5.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        );
        const PowerIcon = () => (
            <svg class="w-4 h-4 text-zinc-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.77 0"/></svg>
        );

        const OrbitIcon = () => (
            <svg 
                class="w-6 h-6 text-zinc-400 group-hover:text-cyan-400 transition-colors drop-shadow-[0_0_8px_rgba(34,211,238,0.4)]" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                stroke-width="1.5"
            >
                <ellipse cx="12" cy="12" rx="9" ry="3" transform="rotate(-30 12 12)" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3.5" fill="currentColor" class="text-zinc-500 group-hover:text-cyan-500 transition-colors" />
                <circle cx="5" cy="8" r="1" fill="currentColor" />
            </svg>
        );

        // Draggable Component Window Wrapper
        function Draggable({ children, pos, setPos, handleClass, disabled }) {
            const draggingRef = React.useRef(false);
            const relRef = React.useRef({ x: 0, y: 0 });

            const onPointerDown = (e) => {
                if (disabled) return;
                if (handleClass && !e.target.closest(`.${handleClass}`)) return;
                
                draggingRef.current = true;
                relRef.current = {
                    x: e.clientX - pos.x,
                    y: e.clientY - pos.y
                };
                e.preventDefault();
                e.stopPropagation();
            };

            React.useEffect(() => {
                const onPointerMove = (e) => {
                    if (!draggingRef.current) return;
                    setPos({
                        x: e.clientX - relRef.current.x,
                        y: e.clientY - relRef.current.y
                    });
                };

                const onPointerUp = () => {
                    draggingRef.current = false;
                };

                window.addEventListener('pointermove', onPointerMove);
                window.addEventListener('pointerup', onPointerUp);
                return () => {
                    window.removeEventListener('pointermove', onPointerMove);
                    window.removeEventListener('pointerup', onPointerUp);
                };
            }, [pos, disabled, setPos]);

            const style = disabled ? {} : {
                position: 'absolute',
                left: `${pos.x}px`,
                top: `${pos.y}px`
            };

            return (
                <div onPointerDown={onPointerDown} style={style} class={`z-30 ${disabled ? 'w-full h-full' : draggingRef.current ? '' : 'transition-[left,top] duration-300 ease-in-out'}`}>
                    {children}
                </div>
            );
        }

        function OrionOS() {
            const [time, setTime] = React.useState('');
            const [fps, setFps] = React.useState(60);
            const [activeWindow, setActiveWindow] = React.useState('hub');
            const [isMaximized, setIsMaximized] = React.useState(false);
            const [isVisible, setIsVisible] = React.useState(true);
            const [isAnimating, setIsAnimating] = React.useState(false);
            const [isStartOpen, setIsStartOpen] = React.useState(false);
            const [windowPos, setWindowPos] = React.useState({ x: 160, y: 96 });
            const [hubTab, setHubTab] = React.useState('dashboard');

            // GitHub Base Endpoint URL Configuration
            const GITHUB_RAW_BASE = "https://raw.githubusercontent.com/orion-os/os/main/wallpapers/";

            // Updated Registry featuring your specialized dynamic image and video assets
            const githubWallpapers = [
                { id: 'wall-orion', name: 'Orion Default', file: 'orion.png', type: 'image' },
                { id: 'wall-king', name: 'King Canvas', file: 'king.png', type: 'image' },
                { id: 'wall-gojo', name: 'Gojo Motion Arena', file: 'gojo.mp4', type: 'video' },
                { id: 'wall-fox', name: 'Snow Fox Live', file: 'snow fox.mp4', type: 'video' },
                { id: 'wall-sukuna', name: 'Sukuna Fire Unleashed', file: 'sukuna-fire.mp4', type: 'video' }
            ];

            const [selectedWallpaper, setSelectedWallpaper] = React.useState(githubWallpapers[0]);

            // Track background styles cleanly
            const activeAssetUrl = `${GITHUB_RAW_BASE}${encodeURIComponent(selectedWallpaper.file)}`;

            React.useEffect(() => {
                const updateTime = () => {
                    const now = new Date();
                    setTime(now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }));
                };
                updateTime();
                const interval = setInterval(updateTime, 60000);
                return () => clearInterval(interval);
            }, []);

            React.useEffect(() => {
                let lastCalledTime = performance.now();
                let frameCount = 0;
                let animationId;

                const calcFps = () => {
                    const now = performance.now();
                    frameCount++;
                    if (now - lastCalledTime >= 1000) {
                        setFps(Math.round((frameCount * 1000) / (now - lastCalledTime)));
                        frameCount = 0;
                        lastCalledTime = now;
                    }
                    animationId = requestAnimationFrame(calcFps);
                };
                animationId = requestAnimationFrame(calcFps);
                return () => cancelAnimationFrame(animationId);
            }, []);

            const apps = [
                { id: 'hub', label: 'System Hub', icon: HubIcon, defaultX: 32, defaultY: 80 },
                { id: 'library', label: 'Media Deck', icon: MediaIcon, defaultX: 32, defaultY: 180 },
                { id: 'files', label: 'Storage', icon: StorageIcon, defaultX: 32, defaultY: 280 },
            ];

            const handleWindowClose = () => {
                if (isAnimating) return;
                setIsAnimating(true);
                setIsVisible(false);
                setTimeout(() => {
                    setActiveWindow(null);
                    setIsMaximized(false);
                    setIsAnimating(false);
                }, 300);
            };

            const handleWindowMinimize = () => {
                if (isAnimating) return;
                if (isMaximized) {
                    setIsMaximized(false);
                } else {
                    setIsAnimating(true);
                    setIsVisible(false);
                    setTimeout(() => setIsAnimating(false), 300);
                }
            };

            const handleAppClick = (appId, explicitTab = null) => {
                if (isAnimating) return;
                if (explicitTab) setHubTab(explicitTab);

                if (activeWindow === appId && !explicitTab) {
                    setIsAnimating(true);
                    setIsVisible(!isVisible);
                    setTimeout(() => setIsAnimating(false), 300);
                } else {
                    setIsAnimating(true);
                    if (isVisible && activeWindow !== appId) {
                        setIsVisible(false);
                        setTimeout(() => {
                            setActiveWindow(appId);
                            setIsMaximized(false);
                            setIsVisible(true);
                            setIsAnimating(false);
                        }, 200);
                    } else {
                        setActiveWindow(appId);
                        if (activeWindow === appId) setIsVisible(true);
                        setIsMaximized(false);
                        setTimeout(() => setIsAnimating(false), 300);
                    }
                }
                setIsStartOpen(false);
            };

            return (
                <div class="relative w-full h-screen text-zinc-100 overflow-hidden select-none bg-[#09090b]">
                    
                    {/* WALLPAPER ENGINE BACKGROUND PIPELINE RENDERER (IMAGE VS VIDEO DETECTOR) */}
                    <div class="absolute inset-0 w-full h-full z-0 pointer-events-none transition-all duration-700">
                        {selectedWallpaper.type === 'video' ? (
                            <video 
                                key={activeAssetUrl}
                                src={activeAssetUrl}
                                autoPlay 
                                loop 
                                muted 
                                playsInline
                                class="w-full h-full object-cover"
                            />
                        ) : (
                            <div 
                                style={{ backgroundImage: `url('${activeAssetUrl}')` }}
                                class="w-full h-full bg-cover bg-center transition-all duration-700"
                            />
                        )}
                    </div>

                    {/* INTERFACE RENDERING OVERLAYS FOR OPTIMIZED CONTRAST */}
                    <div class="absolute inset-0 bg-black/20 z-0 pointer-events-none backdrop-brightness-[0.92]" />

                    {/* SYSTEM TOP BAR */}
                    <header class="absolute top-0 left-0 right-0 h-10 z-50 flex items-center justify-between px-6 bg-zinc-950/40 border-b border-zinc-800/20 backdrop-blur-md text-xs font-medium text-zinc-400">
                        <div class="flex items-center gap-5">
                            <span class="text-zinc-100 font-semibold tracking-tight">orionOS</span>
                            <span class="text-zinc-800">|</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">File</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">View</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">Special</span>
                        </div>
                        <div class="flex items-center gap-4 text-zinc-400">
                            <span class="bg-zinc-900/80 px-2 py-0.5 rounded border border-zinc-800 text-[10px] text-emerald-400 font-mono">{fps} FPS</span>
                            <span class="font-normal text-zinc-300">{time}</span>
                        </div>
                    </header>

                    {/* DESKTOP DESK WORKSPACE */}
                    <main class="relative w-full h-full z-10" onClick={() => setIsStartOpen(false)}>
                        
                        {/* ICON SHORTCUT MAP LOOP */}
                        {apps.map((app) => {
                            const AppIcon = app.icon;
                            const isOpen = activeWindow === app.id && isVisible;
                            return (
                                <div key={app.id} style={{ position: 'absolute', left: `${app.defaultX}px`, top: `${app.defaultY}px` }} class="z-20">
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); handleAppClick(app.id); }}
                                        class="group flex flex-col items-center justify-center w-20 h-20 rounded-xl border border-transparent hover:border-zinc-700/30 hover:bg-zinc-950/30 transition-all text-center cursor-pointer"
                                    >
                                        <div class={`p-3 rounded-xl bg-zinc-950/40 border border-zinc-800/30 backdrop-blur-md shadow-md relative text-zinc-300 group-hover:text-zinc-100 pointer-events-none transition-all duration-300
                                            ${isOpen ? 'bg-zinc-900/80 border-zinc-700/60 scale-105 shadow-cyan-950/20' : ''}`}>
                                            <AppIcon />
                                            {activeWindow === app.id && (
                                                <span class={`absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-zinc-400 transition-all duration-300 ${isVisible ? 'bg-zinc-100' : 'bg-zinc-500'}`} />
                                            )}
                                        </div>
                                        <span class="text-[10px] mt-2 text-zinc-300 group-hover:text-zinc-100 font-medium drop-shadow-md truncate w-full px-1 pointer-events-none">
                                            {app.label}
                                        </span>
                                    </button>
                                </div>
                            );
                        })}

                        {/* WINDOW SECTIONS */}
                        {activeWindow && (
                            <div class={`w-full h-full absolute inset-0 z-30 ${isVisible ? "" : "pointer-events-none"}`}>
                                <Draggable pos={windowPos} setPos={setWindowPos} handleClass="window-drag-bar" disabled={isMaximized}>
                                    <div 
                                        style={
                                            isMaximized 
                                                ? { position: 'fixed', left: '16px', top: '56px', width: 'calc(100vw - 32px)', height: 'calc(100vh - 132px)' } 
                                                : { width: 'calc(100vw - 220px)', height: 'calc(100vh - 240px)', minWidth: '540px', minHeight: '400px' }
                                        }
                                        class={`bg-zinc-950/92 border border-zinc-800/80 backdrop-blur-xl rounded-xl shadow-2xl flex flex-col overflow-hidden ease-in-out origin-center
                                            transition-[opacity,transform,blur,width,height,left,top,position] duration-300
                                            ${isVisible ? 'opacity-100 scale-100 blur-none' : 'opacity-0 scale-95 blur-sm'}`}
                                        onClick={(e) => e.stopPropagation()}
                                    >
                                        {/* Drag Bar Frame */}
                                        <div class="window-drag-bar h-12 bg-zinc-900/40 border-b border-zinc-800/30 flex items-center px-5 cursor-grab active:cursor-grabbing select-none relative shrink-0">
                                            <div class="flex items-center gap-2 group/lights z-10">
                                                <button onClick={handleWindowClose} class="w-3 h-3 rounded-full bg-[#ff5f56] border border-[#e0443e] flex items-center justify-center cursor-pointer relative"><span class="text-[9px] font-bold text-[#4c0002] opacity-0 group-hover/lights:opacity-100 transition-opacity absolute pb-0.5">✕</span></button>
                                                <button onClick={handleWindowMinimize} class="w-3 h-3 rounded-full bg-[#ffbd2e] border border-[#dea123] flex items-center justify-center cursor-pointer relative"><span class="text-[11px] font-bold text-[#5c3e00] opacity-0 group-hover/lights:opacity-100 transition-opacity absolute pb-1.5">_</span></button>
                                                <button onClick={() => setIsMaximized(!isMaximized)} class="w-3 h-3 rounded-full bg-[#27c93f] border border-[#1aaa2c] flex items-center justify-center cursor-pointer relative"><span class="text-[7px] font-bold text-[#004d05] opacity-0 group-hover/lights:opacity-100 transition-opacity absolute pb-0.5">{isMaximized ? '⌥' : '⤢'}</span></button>
                                            </div>
                                            <div class="absolute inset-x-0 text-center pointer-events-none">
                                                <span class="text-xs font-semibold tracking-wide text-zinc-400 capitalize">{activeWindow === 'hub' ? 'System Hub' : 'Storage Explorer'}</span>
                                            </div>
                                        </div>

                                        {/* Content View Frame */}
                                        <div class="flex-1 overflow-y-auto cursor-default">
                                            
                                            {/* SYSTEM HUB ROUTER CONTENT (MERGED DASHBOARD + SETTINGS ENGINE) */}
                                            {activeWindow === 'hub' && (
                                                <div class="flex h-full min-h-[320px]">
                                                    {/* Side Navigation Panels */}
                                                    <div class="w-44 border-r border-zinc-800/40 bg-zinc-900/20 p-3 space-y-1 shrink-0 select-none">
                                                        <div class="text-[9px] font-bold text-zinc-600 px-3 uppercase tracking-wider mb-1">Status Environment</div>
                                                        <button onClick={() => setHubTab('dashboard')} class={`w-full text-left px-3 py-1.5 rounded-lg text-xs font-medium cursor-pointer transition-colors ${hubTab === 'dashboard' ? 'bg-zinc-800 text-white' : 'text-zinc-400 hover:text-zinc-200'}`}>Dashboard Metrics</button>
                                                        
                                                        <div class="text-[9px] font-bold text-zinc-600 px-3 uppercase tracking-wider mt-4 mb-1">Configurations</div>
                                                        <button onClick={() => setHubTab('wallpaper')} class={`w-full text-left px-3 py-1.5 rounded-lg text-xs font-medium cursor-pointer transition-colors ${hubTab === 'wallpaper' ? 'bg-zinc-800 text-white' : 'text-zinc-400 hover:text-zinc-200'}`}>Wallpaper Engine</button>
                                                        <button onClick={() => setHubTab('system')} class={`w-full text-left px-3 py-1.5 rounded-lg text-xs font-medium cursor-pointer transition-colors ${hubTab === 'system' ? 'bg-zinc-800 text-white' : 'text-zinc-400 hover:text-zinc-200'}`}>System Properties</button>
                                                    </div>

                                                    {/* Core Controller Content Viewport */}
                                                    <div class="flex-1 p-6 overflow-y-auto">
                                                        {hubTab === 'dashboard' && (
                                                            <div class="space-y-6">
                                                                <div>
                                                                    <h2 class="text-base font-bold text-white">System Diagnostics</h2>
                                                                    <p class="text-[11px] text-zinc-400 mt-0.5">Telemetry tracking for memory display frames.</p>
                                                                </div>
                                                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                                    <div class="p-4 rounded-xl bg-zinc-900/30 border border-zinc-800/40 shadow-inner">
                                                                        <div class="text-[10px] text-zinc-500 font-medium uppercase tracking-wider">Engine Performance</div>
                                                                        <div class="text-2xl font-bold text-emerald-400 mt-1 font-mono">{fps} <span class="text-xs text-zinc-500 font-normal font-sans">FPS</span></div>
                                                                    </div>
                                                                    <div class="p-4 rounded-xl bg-zinc-900/30 border border-zinc-800/40 shadow-inner">
                                                                        <div class="text-[10px] text-zinc-500 font-medium uppercase tracking-wider">Active Canvas Node</div>
                                                                        <div class="text-xs font-semibold text-zinc-200 mt-2.5 truncate flex items-center gap-1.5">
                                                                            <span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse" /> {selectedWallpaper.name}
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        )}

                                                        {hubTab === 'wallpaper' && (
                                                            <div>
                                                                <div class="mb-4">
                                                                    <h3 class="text-sm font-bold text-white">Mixed Media Wallpaper Matrix</h3>
                                                                    <p class="text-[11px] text-zinc-400 mt-0.5">Streaming live files directly from your repository layer.</p>
                                                                </div>
                                                                <div class="grid grid-cols-2 gap-3">
                                                                    {githubWallpapers.map((wp) => {
                                                                        const isCurrent = wp.id === selectedWallpaper.id;
                                                                        const imgRawUrl = `${GITHUB_RAW_BASE}${encodeURIComponent(wp.file)}`;
                                                                        return (
                                                                            <button 
                                                                                key={wp.id}
                                                                                onClick={() => setSelectedWallpaper(wp)}
                                                                                class={`p-2.5 rounded-xl text-left border relative overflow-hidden bg-zinc-900/20 group cursor-pointer transition-all ${isCurrent ? 'border-cyan-400 bg-zinc-900/60 shadow-lg' : 'border-zinc-800/80 hover:border-zinc-700'}`}
                                                                            >
                                                                                <div class="h-14 w-full rounded-lg mb-2 bg-zinc-950 border border-zinc-900/60 relative flex items-center justify-center overflow-hidden text-center text-[9px] text-zinc-500 font-mono">
                                                                                    {wp.type === 'video' ? (
                                                                                        <video src={imgRawUrl} muted class="w-full h-full object-cover opacity-60" />
                                                                                    ) : (
                                                                                        <div style={{ backgroundImage: `url('${imgRawUrl}')` }} class="w-full h-full bg-cover bg-center opacity-60" />
                                                                                    )}
                                                                                    <div class="absolute inset-0 bg-black/30 flex items-center justify-center">
                                                                                        <span class="bg-zinc-950/90 px-1.5 py-0.5 rounded border border-zinc-800 text-[8px] uppercase tracking-wider text-zinc-400">{wp.type}</span>
                                                                                    </div>
                                                                                </div>
                                                                                <span class="text-xs font-medium text-zinc-300 block truncate">{wp.name}</span>
                                                                                <span class="text-[9px] text-zinc-500 font-mono block mt-0.5 truncate">{wp.file}</span>
                                                                                {isCurrent && (
                                                                                    <span class="absolute top-2 right-2 text-[9px] bg-cyan-950 border border-cyan-800 text-cyan-400 font-medium px-1.5 py-0.5 rounded">Active</span>
                                                                                )}
                                                                            </button>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </div>
                                                        )}

                                                        {hubTab === 'system' && (
                                                            <div class="space-y-4">
                                                                <h3 class="text-sm font-bold text-white">System Architectures</h3>
                                                                <div class="space-y-2 text-xs text-zinc-400">
                                                                    <div class="flex justify-between py-1.5 border-b border-zinc-900"><span>Build Patch Version</span><span class="font-mono text-zinc-300">v2.4.0-MEDIA_FLOW</span></div>
                                                                    <div class="flex justify-between py-1.5 border-b border-zinc-900"><span>Media Renderer Pipeline</span><span class="text-zinc-300">HTML5 Hybrid Audio/Video Frame Deck</span></div>
                                                                    <div class="flex justify-between py-1.5 border-b border-zinc-900"><span>Repository Link Origin</span><span class="font-mono text-cyan-400">orion-os/os/wallpapers/</span></div>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            )}

                                            {/* FILES INTERFACE STORAGE CHANNELS */}
                                            {activeWindow === 'files' && (
                                                <div class="p-6 space-y-6">
                                                    <div>
                                                        <h3 class="text-sm font-bold text-white flex items-center gap-1.5">
                                                            <svg class="w-4 h-4 text-zinc-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
                                                            GitHub Core Filesystem / wallpapers /
                                                        </h3>
                                                        <p class="text-[11px] text-zinc-400 mt-0.5">Detected repository payloads. Click any block item below to trigger deployment onto active desktop render canvas.</p>
                                                    </div>

                                                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                                        {githubWallpapers.map((wp) => {
                                                            const isApplied = wp.id === selectedWallpaper.id;
                                                            const fileRawUrl = `${GITHUB_RAW_BASE}${encodeURIComponent(wp.file)}`;
                                                            return (
                                                                <div 
                                                                    key={wp.id} 
                                                                    onClick={() => { handleAppClick('hub', 'wallpaper'); }}
                                                                    class={`p-2.5 rounded-xl bg-zinc-900/30 border transition-all text-center cursor-pointer group relative
                                                                        ${isApplied ? 'border-cyan-500 bg-zinc-900/60' : 'border-zinc-800/60 hover:border-zinc-700'}`}
                                                                >
                                                                    <div class="h-16 w-full rounded-lg mb-2 relative bg-zinc-950 border border-zinc-900/40 flex items-center justify-center overflow-hidden">
                                                                        {wp.type === 'video' ? (
                                                                            <video src={fileRawUrl} muted class="w-full h-full object-cover" />
                                                                        ) : (
                                                                            <div style={{ backgroundImage: `url('${fileRawUrl}')` }} class="w-full h-full bg-cover bg-center" />
                                                                        )}
                                                                        <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                                                            <span class="text-[10px] font-semibold text-white bg-zinc-900/90 px-2 py-1 rounded border border-zinc-700 shadow-md">
                                                                                {isApplied ? 'Active' : 'Deploy'}
                                                                            </span>
                                                                        </div>
                                                                    </div>
                                                                    <div class="text-[11px] font-medium text-zinc-300 truncate">{wp.file}</div>
                                                                    <div class="text-[9px] text-zinc-500 font-mono mt-0.5 capitalize">{wp.type} Link</div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            )}

                                            {/* MEDIA DECK SANDBOX PREVIEW */}
                                            {activeWindow === 'library' && (
                                                <div class="h-full flex flex-col items-center justify-center text-center py-12">
                                                    <h3 class="text-xs font-semibold text-zinc-300 capitalize">Media Deck Frame Sandbox</h3>
                                                    <p class="text-[11px] text-zinc-500 max-w-xs mt-1">Primary safe media playback sandbox securely mounted inside space layout environments.</p>
                                                </div>
                                            )}

                                        </div>
                                    </div>
                                </Draggable>
                            </div>
                        )}
                    </main>

                    {/* START DRAWER APPLICATIONS MENU */}
                    {isStartOpen && (
                        <div class="absolute bottom-24 left-1/2 -translate-x-1/2 md:left-8 md:translate-x-0 w-72 bg-zinc-950/95 border border-zinc-800/80 backdrop-blur-2xl rounded-2xl shadow-2xl z-50 p-4 flex flex-col overflow-hidden" onClick={(e) => e.stopPropagation()}>
                            <div class="px-2 pb-3 mb-2 border-b border-zinc-900 flex flex-col">
                                <span class="text-xs font-semibold text-zinc-200">orionOS System</span>
                                <span class="text-[10px] text-zinc-500 mt-0.5">Local Workspace Node</span>
                            </div>
                            <div class="flex-1 space-y-1">
                                <div class="text-[9px] font-bold text-zinc-600 px-2 uppercase tracking-wider mb-1">Applications</div>
                                {apps.map((app) => {
                                    const AppIcon = app.icon;
                                    return (
                                        <button key={app.id} onClick={() => handleAppClick(app.id)} class="w-full flex items-center gap-3 px-2.5 py-2 rounded-xl text-xs text-zinc-400 hover:text-zinc-100 hover:bg-zinc-900/60 transition-colors text-left cursor-pointer">
                                            <div class="text-zinc-500 group-hover:text-zinc-300"><AppIcon /></div>
                                            <span class="font-medium">{app.label}</span>
                                        </button>
                                    );
                                })}
                            </div>
                            <div class="mt-4 pt-2 border-t border-zinc-900 flex items-center justify-between px-2 text-[11px] text-zinc-500">
                                <span class="text-[10px]">v2.4.0-Stable</span>
                                <button onClick={() => { setIsStartOpen(false); setIsVisible(false); }} class="flex items-center gap-1.5 hover:text-rose-400 transition-colors cursor-pointer"><PowerIcon /><span>Log Out</span></button>
                            </div>
                        </div>
                    )}

                    {/* INTERACTIVE SYSTEM TASKBAR DOCK */}
                    <div class="absolute bottom-5 left-1/2 -translate-x-1/2 z-50 pointer-events-auto">
                        <div class="h-18 px-6 rounded-2xl bg-zinc-950/40 border border-zinc-800/40 backdrop-blur-xl flex items-center gap-5 shadow-2xl">
                            
                            <button onClick={(e) => { e.stopPropagation(); setIsStartOpen(!isStartOpen); }} class={`w-11 h-11 rounded-xl transition-all duration-300 cursor-pointer border relative group flex items-center justify-center bg-zinc-900/30 hover:bg-zinc-900/70 ${isStartOpen ? 'border-cyan-400 scale-105 shadow-[0_0_12px_rgba(34,211,238,0.25)] bg-zinc-900/90' : 'border-zinc-800/80 hover:border-zinc-500'}`}><OrbitIcon /><span class={`absolute -bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-cyan-400 transition-all duration-300 ${isStartOpen ? 'scale-100' : 'scale-0'}`} /></button>
                            <span class="text-zinc-800 font-light text-xl select-none">|</span>

                            {apps.map((app) => {
                                const AppIcon = app.icon;
                                const isCurrentActive = activeWindow === app.id;
                                const isCurrentOpen = isCurrentActive && isVisible;
                                return (
                                    <button
                                        key={app.id}
                                        onClick={(e) => { e.stopPropagation(); handleAppClick(app.id); }}
                                        class={`p-3 rounded-xl transition-all duration-300 relative cursor-pointer group transform active:scale-95
                                            ${isCurrentOpen ? 'bg-zinc-100 text-zinc-950 shadow-md scale-105' : isCurrentActive ? 'text-zinc-400 border border-zinc-800/50 bg-zinc-900/40 shadow-inner scale-100' : 'text-zinc-400 hover:text-zinc-100 hover:bg-zinc-800/40'}`}
                                    >
                                        <div class={isCurrentOpen ? 'text-zinc-950' : ''}><AppIcon /></div>
                                        <span class={`absolute bottom-0.5 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full transition-all duration-300
                                            ${isCurrentOpen ? 'bg-zinc-950 scale-100' : isCurrentActive ? 'bg-zinc-500 scale-100' : 'bg-cyan-400 scale-0 group-hover:scale-100'}`} />
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    <footer class="absolute bottom-0 left-0 right-0 h-7 px-6 bg-zinc-950/10 border-t border-zinc-900/20 flex items-center justify-between text-[10px] text-zinc-500 z-40"><span>Workspace Pipeline: Core</span><span>orionOS Node Alpha</span></footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OrionOS />);
    </script>
</body>
</html>
