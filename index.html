<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowfall Clock Wallpaper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Deep, dark winter gradient background */
            background: linear-gradient(to bottom, #0f172a, #1e1b4b);
        }

        /* Container for the clock and date */
        .widget-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #ffffff;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            z-index: 10;
            pointer-events: none; /* Allows clicks to pass through if needed */
        }

        #time {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        #date {
            font-size: 1.75rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.85;
        }

        /* Canvas for the snowfall animation */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div id="time">00:00:00</div>
        <div id="date">Loading Date...</div>
    </div>

    <canvas id="snowCanvas"></canvas>

    <script>
        // --- CLOCK LOGIC ---
        function updateClock() {
            const now = new Date();
            
            // Format time (HH:MM:SS)
            let hours = String(now.getHours()).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            let seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
            
            // Format date (e.g., Monday, October 25)
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
        }
        
        // Update clock immediately and then every second
        updateClock();
        setInterval(updateClock, 1000);


        // --- SNOWFALL LOGIC ---
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas sizes
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Snowflake settings
        const maxFlakes = 150; 
        const flakes = [];

        // Create snowflake objects
        for (let i = 0; i < maxFlakes; i++) {
            flakes.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 3 + 1, // radius (size)
                d: Math.random() * maxFlakes, // density/speed factor
                speedY: Math.random() * 1 + 0.5,
                drift: Math.random() * 1 - 0.5
            });
        }

        // Draw and animate the flakes
        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctx.beginPath();

            for (let i = 0; i < maxFlakes; i++) {
                const f = flakes[i];
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);

                // Update positions for next frame
                f.y += f.speedY;
                f.x += f.drift;

                // If flake reaches the bottom or sides, reset it to the top
                if (f.y > canvas.height || f.x > canvas.width || f.x < 0) {
                    flakes[i] = {
                        x: Math.random() * canvas.width,
                        y: -10,
                        r: f.r,
                        d: f.d,
                        speedY: f.speedY,
                        drift: f.drift
                    };
                }
            }

            ctx.fill();
            requestAnimationFrame(drawSnow);
        }

        // Start the animation loop
        drawSnow();
    </script>
</body>
</html>
