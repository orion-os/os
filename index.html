<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orbitOS Desktop</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='1.5'><ellipse cx='12' cy='12' rx='9' ry='3' transform='rotate(-30 12 12)' stroke-linecap='round' stroke-linejoin='round'/><circle cx='12' cy='12' r='3.5' fill='white'/><circle cx='5' cy='8' r='1' fill='white'/></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-[#09090b] text-zinc-100 m-0 p-0 select-none overflow-hidden antialiased">
    <div id="root"></div>
    <script type="text/babel">
        const HubIcon = () => <svg className="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>;
        const MediaIcon = () => <svg className="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m10 9 5 3-5 3V9z"/></svg>;
        const StorageIcon = () => <svg className="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>;

        const OrbitIcon = ({ className = "w-5 h-5" }) => (
            <svg className={`${className} text-white transition-all`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                <ellipse cx="12" cy="12" rx="9" ry="3" transform="rotate(-30 12 12)"/>
                <circle cx="12" cy="12" r="3.5" fill="currentColor"/>
                <circle cx="5" cy="8" r="1" fill="currentColor"/>
            </svg>
        );

        // Sound Effects
        const soundEffects = {
            click: new Audio('https://freesound.org/data/previews/174/174893_2921711-lq.mp3'),
            open: new Audio('https://freesound.org/data/previews/256/256696_3989065-lq.mp3'),
            close: new Audio('https://freesound.org/data/previews/256/256692_3989065-lq.mp3'),
            wallpaper: new Audio('https://freesound.org/data/previews/256/256698_3989065-lq.mp3')
        };

        function SnowOverlay() {
            const canvasRef = React.useRef(null);
            React.useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                resize();
                window.addEventListener('resize', resize);

                const flakes = Array.from({length: 160}, () => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 3.2 + 1,
                    speed: Math.random() * 1.8 + 0.7,
                    drift: Math.random() * 1.2 - 0.6
                }));

                let id;
                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "rgba(255,255,255,0.88)";
                    flakes.forEach(f => {
                        ctx.beginPath();
                        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                        ctx.fill();
                        f.y += f.speed;
                        f.x += f.drift;
                        if (f.y > canvas.height) f.y = -20;
                    });
                    id = requestAnimationFrame(animate);
                };
                animate();
                return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(id); };
            }, []);
            return <canvas ref={canvasRef} className="absolute inset-0 pointer-events-none z-10" />;
        }

        function OrbitOS() {
            const GITHUB_BASE = "https://raw.githubusercontent.com/orbits-os/os/main/wallpapers/";

            const wallpapers = [
                { id: 'orbit', name: 'Orbit Default', file: 'orbit.png', type: 'image' },
                { id: 'king', name: 'King Canvas', file: 'king.PNG', type: 'image' },
                { id: 'gojo', name: 'Gojo Motion Arena', file: 'Gojo.mp4', type: 'video' },
                { id: 'snowfox', name: 'Snow Fox Live', file: 'SnowFox.mp4', type: 'video' },
                { id: 'sukuna', name: 'Sukuna Fire Unleashed', file: 'sukuna-fire.mp4', type: 'video' }
            ];

            const [selectedWallpaper, setSelectedWallpaper] = React.useState(wallpapers[0]);
            const [activeWindow, setActiveWindow] = React.useState(null);
            const [isVisible, setIsVisible] = React.useState(false);
            const [isStartOpen, setIsStartOpen] = React.useState(false);

            const currentUrl = `${GITHUB_BASE}${encodeURIComponent(selectedWallpaper.file)}`;

            // Wallpaper change sound
            React.useEffect(() => {
                soundEffects.wallpaper.currentTime = 0;
                soundEffects.wallpaper.play().catch(() => {});
            }, [selectedWallpaper.id]);

            const handleWallpaperChange = (wp) => {
                setSelectedWallpaper(wp);
            };

            const handleAppClick = (app) => {
                soundEffects.click.currentTime = 0;
                soundEffects.click.play().catch(() => {});
                setActiveWindow(app);
                setIsVisible(true);
                setIsStartOpen(false);
            };

            return (
                <div className="relative w-full h-screen overflow-hidden select-none">
                    {/* Background Wallpaper */}
                    <div className="absolute inset-0 z-0">
                        {selectedWallpaper.type === 'video' ? (
                            <video key={currentUrl} src={currentUrl} autoPlay loop muted playsInline className="w-full h-full object-cover" />
                        ) : (
                            <div style={{ backgroundImage: `url('${currentUrl}')` }} className="w-full h-full bg-cover bg-center" />
                        )}
                        <SnowOverlay />
                    </div>
                    <div className="absolute inset-0 bg-black/25 z-0" />

                    {/* Top Bar */}
                    <header className="absolute top-0 left-0 right-0 h-11 z-50 bg-zinc-950/70 backdrop-blur-md border-b border-zinc-700 flex items-center px-6 text-sm">
                        <div onClick={() => setIsStartOpen(!isStartOpen)} className="cursor-pointer">
                            <OrbitIcon />
                        </div>
                        <div className="ml-auto flex items-center gap-6 text-zinc-300">
                            <span>60 FPS</span>
                            <span>{new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}</span>
                        </div>
                    </header>

                    {/* Desktop Icons */}
                    <main className="relative z-10 h-full pt-14" onClick={() => setIsStartOpen(false)}>
                        {[
                            { label: "System Hub", icon: HubIcon, id: "hub" },
                            { label: "Media Deck", icon: MediaIcon, id: "library" },
                            { label: "Storage", icon: StorageIcon, id: "files" }
                        ].map((app, i) => (
                            <div key={i} style={{ left: "48px", top: `${90 + i * 110}px` }} className="absolute z-20">
                                <button onClick={() => handleAppClick(app.id)} className="flex flex-col items-center w-20 group">
                                    <div className="p-4 bg-zinc-900/70 border border-zinc-700 rounded-2xl group-active:scale-95 transition-transform">
                                        <app.icon />
                                    </div>
                                    <span className="text-xs mt-2 text-zinc-200">{app.label}</span>
                                </button>
                            </div>
                        ))}
                    </main>

                    {/* Wallpaper Chooser Window */}
                    {activeWindow === "hub" && (
                        <div className="absolute inset-0 z-40 flex items-center justify-center bg-black/70" onClick={() => setIsVisible(false)}>
                            <div className="bg-zinc-900 rounded-3xl p-8 w-full max-w-5xl mx-4 max-h-[85vh] overflow-auto" onClick={e => e.stopPropagation()}>
                                <h2 className="text-2xl font-semibold mb-6">Wallpaper Engine</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {wallpapers.map(wp => {
                                        const url = `${GITHUB_BASE}${encodeURIComponent(wp.file)}`;
                                        return (
                                            <button key={wp.id} onClick={() => handleWallpaperChange(wp)} className={`rounded-2xl overflow-hidden border-2 transition-all ${selectedWallpaper.id === wp.id ? 'border-cyan-400 scale-105' : 'border-transparent hover:border-zinc-600'}`}>
                                                {wp.type === 'video' ? (
                                                    <video src={url} muted loop className="w-full aspect-video object-cover" />
                                                ) : (
                                                    <img src={url} className="w-full aspect-video object-cover" alt={wp.name} />
                                                )}
                                                <div className="p-4 text-left">
                                                    <div className="font-medium">{wp.name}</div>
                                                    <div className="text-xs text-zinc-500">{wp.file}</div>
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Bottom Dock */}
                    <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900/90 backdrop-blur-2xl border border-zinc-700 rounded-3xl px-5 py-2.5 flex items-center gap-3 z-50 shadow-2xl">
                        <button onClick={() => setIsStartOpen(!isStartOpen)} className="p-3 hover:bg-zinc-800 rounded-2xl transition">
                            <OrbitIcon className="w-7 h-7" />
                        </button>
                        {["hub", "library", "files"].map(id => (
                            <button key={id} onClick={() => handleAppClick(id)} className="p-3 hover:bg-zinc-800 rounded-2xl transition">
                                {id === "hub" && <HubIcon />}
                                {id === "library" && <MediaIcon />}
                                {id === "files" && <StorageIcon />}
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(OrbitOS));
    </script>
</body>
</html>
